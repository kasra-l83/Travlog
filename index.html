<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>Travlog</title>
    <link rel="icon" href="icon/logo.png" type="image/x-icon" />
  </head>
  <body>
    <main class="max-w-[1440px] mx-auto">
      <header class="h-28 px-4 flex justify-between items-center flex-row-reverse sm:flex-row sm:px-16 lg:px-28">
        <div class="size-9 bg-purple text-[white] rounded-xl flex justify-center items-center lg:hidden"><i style="font-size:20px" class="fa">&#xf0c9;</i></div>
        <span class="h-10 flex items-center gap-x-4">
          <img src="icon/logo.png" alt="Logo" class="size-10">
          <h1 class="font-bold text-2xl">Travlog</h1>
        </span>
        <span class="h-4 hidden gap-x-16 text-[gray] lg:flex">
          <a href="" class="font-bold text-sm">Home</a>
          <a href="" class="font-bold text-sm">Discover</a>
          <a href="" class="font-bold text-sm">Special Deals</a>
          <a href="" class="font-bold text-sm">Contact</a>
        </span>
        <div class="h-12 hidden gap-x-7 sm:flex">
          <button class="font-bold text-sm">Log In</button>
          <button class="w-[115px] font-bold text-sm bg-purple rounded-[100px] text-[white]">Sign Up</button>
        </div>
      </header>
      <section class="h-[841px] relative py-16 px-28 flex justify-between flex-row">
        <div class="w-[412px] flex flex-col gap-y-11 justify-center">
          <button class="w-56 text-pink py-4 px-8 bg-[white] rounded-full font-bold text-sm shadow flex gap-4">Explore the word!<i style="font-size:20px" class="fa">&#xf290;</i></button>
          <h1 class="font-bold text-[69px] leading-[83px]">Travel<span class="text-pink ml-5">top destination</span>of the world</h1>
          <p class="text-lg text-[gray] font-normal">We always Make our customer happy by providing as many choices as possible</p>
          <div class="h-14 flex gap-x-4">
            <button class="py-4 px-8 bg-purple rounded-full text-[white]">Get Started</button>
            <button class="py-4 px-8 rounded-full border border-[gray] flex items-center gap-x-2"><i style="font-size:20px" class="fa text-purple">&#xf144;</i>Watch Demo</button>
          </div>
        </div>
        <div class="relative">
          <img src="img/world.png" alt="World">
          <img src="img/neighborhood.png" alt="Neighborhood" class="absolute top-20 left-24">
          <img src="img/photographer.png" alt="Photographer" class="absolute top-48 right-24">
          <i style="font-size:50px" class="fa text-pink absolute top-[350px] left-16">&#xf2c6;</i>
          <div class="py-4 px-8 bg-[white] rounded-full font-bold text-sm shadow flex gap-2 absolute right-0 bottom-40"><i class="material-icons text-yellow">&#xe0c8;</i>Top places</div>
          <img src="img/mountainer.png" alt="Mountainer" class="absolute top-[410px] left-24">
          <div class="size-12 bg-orange rounded-full absolute bottom-0 right-60 flex justify-center items-center"><i class="material-icons text-[white]">&#xe7fe;</i></div>
        </div>
        <img src="icon/object.png" class="w-16 h-[169px] absolute left-7 bottom-[-60px]">
      </section>
    </main>
    <script type="module" src="/main.js"></script>
  </body>
</html>
