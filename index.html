<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Travlog</title>
  </head>
  <body>
    <main class="max-w-[1440px] mx-auto">
      <header class="h-28 px-4 flex justify-between items-center flex-row-reverse sm:flex-row sm:px-16 lg:px-28">
        <div class="size-9 bg-purple text-[white] rounded-xl flex justify-center items-center lg:hidden"><i style="font-size:20px" class="fa">&#xf0c9;</i></div>
        <span class="h-10 flex items-center gap-x-4">
          <img src="icon/logo.png" alt="Logo" class="size-10">
          <h1 class="font-bold text-2xl">Travlog</h1>
        </span>
        <span class="h-4 hidden gap-x-16 text-[gray] lg:flex">
          <a href="" class="font-bold text-sm">Home</a>
          <a href="" class="font-bold text-sm">Discover</a>
          <a href="" class="font-bold text-sm">Special Deals</a>
          <a href="" class="font-bold text-sm">Contact</a>
        </span>
        <div class="h-12 hidden gap-x-7 sm:flex">
          <button class="font-bold text-sm">Log In</button>
          <button class="w-[115px] font-bold text-sm bg-purple rounded-[100px] text-[white]">Sign Up</button>
        </div>
      </header>
    </main>
    <script type="module" src="/main.js"></script>
  </body>
</html>
